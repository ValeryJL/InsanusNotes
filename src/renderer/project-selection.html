<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InsanusNotes - Project Selection</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    
    .container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 40px;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      color: #333;
    }
    
    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #667eea;
      text-align: center;
    }
    
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .actions {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
    }
    
    .btn {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-primary {
      background: #667eea;
      color: white;
    }
    
    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    .btn-secondary {
      background: #48bb78;
      color: white;
    }
    
    .btn-secondary:hover {
      background: #38a169;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(72, 187, 120, 0.4);
    }
    
    .recent-projects {
      margin-top: 20px;
    }
    
    .recent-title {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
      font-weight: 600;
    }
    
    .project-list {
      max-height: 200px;
      overflow-y: auto;
    }
    
    .project-item {
      background: #f7fafc;
      padding: 12px 15px;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid #667eea;
    }
    
    .project-item:hover {
      background: #edf2f7;
      transform: translateX(5px);
    }
    
    .project-name {
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 4px;
    }
    
    .project-path {
      font-size: 12px;
      color: #718096;
    }
    
    .empty-state {
      text-align: center;
      padding: 30px;
      color: #a0aec0;
      font-size: 14px;
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      align-items: center;
      justify-content: center;
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
    }
    
    .modal h2 {
      margin-bottom: 20px;
      color: #667eea;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #4a5568;
      font-weight: 600;
      font-size: 14px;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    
    .btn-cancel {
      background: #e2e8f0;
      color: #4a5568;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    
    .btn-create {
      background: #667eea;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🗒️ InsanusNotes</h1>
    <p class="subtitle">Object-Oriented Note-Taking for Programmers</p>
    
    <div class="actions">
      <button class="btn btn-primary" onclick="showCreateModal()">
        ➕ New Project
      </button>
      <button class="btn btn-secondary" onclick="openExistingProject()">
        📂 Open Project
      </button>
    </div>
    
    <div class="recent-projects">
      <div class="recent-title">Recent Projects</div>
      <div class="project-list" id="projectList">
        <div class="empty-state">No recent projects</div>
      </div>
    </div>
  </div>
  
  <div class="modal" id="createModal">
    <div class="modal-content">
      <h2>Create New Project</h2>
      <div class="form-group">
        <label>Project Name</label>
        <input type="text" id="projectName" placeholder="My Awesome Project">
      </div>
      <div class="form-group">
        <label>Project Location</label>
        <input type="text" id="projectPath" placeholder="Click to select folder" readonly onclick="selectFolder()">
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="hideCreateModal()">Cancel</button>
        <button class="btn-create" onclick="createProject()">Create</button>
      </div>
    </div>
  </div>
  
  <script src="./project-selection.js"></script>
</body>
</html>
